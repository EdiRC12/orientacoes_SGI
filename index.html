<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de PDF - SGI</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
        }
        /* Container que força o iOS a criar rolagem */
        .iframe-container {
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch; /* Essencial para iPhone */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe src="https://edirc12.github.io/orientacoes_SGI/APRESENTA%C3%87%C3%83O%20SGI.pdf">
            Seu navegador não suporta a visualização de PDFs. 
            <a href="https://edirc12.github.io/orientacoes_SGI/APRESENTA%C3%87%C3%83O%20SGI.pdf">Clique aqui para baixar.</a>
        </iframe>
    </div>

</body>
</html>
