<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de PDF - SGI</title>
    <style>
        /* Remove margens e faz o iframe ocupar a tela toda */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- O link abaixo aponta diretamente para o arquivo no seu repositório -->
    <iframe src="https://edirc12.github.io/orientacoes_SGI/APRESENTA%C3%87%C3%83O%20SGI.pdf">
        Seu navegador não suporta a visualização de PDFs. 
        <a href="https://edirc12.github.io/orientacoes_SGI/APRESENTA%C3%87%C3%83O%20SGI.pdf">Clique aqui para baixar.</a>
    </iframe>

</body>
</html>
